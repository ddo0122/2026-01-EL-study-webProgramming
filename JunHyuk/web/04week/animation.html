<!doctype html>
<html lang="en">
  <head>
    <title>animation</title>
    <style>
      .box1 {
        position: relative;
        left: 0px;
        width: 100px;
        height: 100px;
        background: #000;
        color: white;

        animation-name: move;
        animation-duration: 2s;
        animation-direction: alternate;
        animation-iteration-count: infinite;
      }

      @keyframes move {
        0% {
          left: 0px;
        }
        100% {
          left: 300px;
        }
      }

      .box2 {
        position: relative;
        left: 0px;
        width: 100px;
        height: 100px;
        background-color: orange;
        margin-top: 50px;
        color: white;

        animation: animation 3s alternate infinite;
      }

      @keyframes animation {
        from {
          left: 0px;
        }
        to {
          left: 300px;
          border-radius: 50%;
          background-color: red;
        }
      }

      .ball {
        text-align: center;
        line-height: 100px;
        position: relative;
        left: 0px;
        width: 100px;
        height: 100px;
        margin-top: 20px;
        margin-left: 50px;
        background: skyblue;
        border-radius: 50%;
        color: white;

        animation: ball 0.5s ease-in infinite alternate;
      }

      @keyframes ball {
        0% {
          top: 0px;
        }
        95% {
          width: 100px;
          height: 100px;
        }
        100% {
          top: 300px;
          width: 120px;
          height: 80px;
        }
      }
    </style>
  </head>
  <body>
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="ball">ball</div>
  </body>
</html>
